name: Run Test Suite

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: project.settings_test
      NY_TIMES_BOOKS_API_URL: "https://example.com"
      NY_TIMES_BOOKS_API_KEY: "test-key"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Set Django settings module
        run: echo "DJANGO_SETTINGS_MODULE=project.settings" >> $GITHUB_ENV

      - name: Run tests
        working-directory: app
        run: |
          pytest

      - name: Debug Django settings module
        working-directory: app
        run: python - << 'EOF'
          import os
          print("DJANGO_SETTINGS_MODULE =", os.getenv("DJANGO_SETTINGS_MODULE"))
          EOF